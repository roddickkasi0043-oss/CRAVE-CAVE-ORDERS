<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crave Cave - UMSKAL</title>
  <style>
    :root {
        --primary-gold: #d4a373; /* Sophisticated gold-brown */
        --dark-coffee: #2c1a12;
        --soft-cream: #fefae0;
        --card-shadow: 0 8px 30px rgba(0,0,0,0.05);
    }

    body { 
        background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
        font-family: 'Plus Jakarta Sans', sans-serif; /* Modern, clean font */
        padding: 15px;
    }

    .container { 
        max-width: 500px; 
        margin: 20px auto; 
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px); /* Modern frosted glass effect */
        padding: 25px; 
        border-radius: 30px; 
        box-shadow: var(--card-shadow);
    }

    .menu-item { 
        background: #fff;
        border: none;
        margin-bottom: 12px;
        padding: 20px; 
        border-radius: 20px;
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        transition: all 0.3s ease;
    }

    .menu-item:hover {
        transform: scale(1.02);
        box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    /* Professional Button Styling */
    .choice-btn {
        background: var(--soft-cream);
        color: var(--dark-coffee);
        border: 1.5px solid var(--primary-gold);
        padding: 10px 15px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        transition: 0.2s;
    }

    .choice-btn:active {
        transform: scale(0.95);
        background: var(--primary-gold);
        color: white;
    }
</style>
</head>
<body>

    <div class="container" id="main-content">
    
    <!-- 1. The Elegant Header Card -->
    <div style="text-align: center; margin-bottom: 25px; border: 1px solid #eee; padding: 20px; border-radius: 20px; background: #fff;">
        <div style="display: inline-block; background: #fdfcfb; color: #d4a373; padding: 5px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">
            📍 UMSKAL - Labuan
        </div>
        <h1 style="margin: 0; font-size: 2.2rem; color: #2c1a12; font-weight: 800;">CRAVE CAVE</h1>
        <p style="color: #888; font-size: 0.9rem; margin-top: 5px;">Premium Soto & Goreng-Goreng</p>
    </div>

    <!-- 2. The Pro Depth Logo (ONLY ONE!) -->
    <div class="logo-wrapper">
        <img src="logo.png" alt="Crave Cave Logo" class="pro-logo">
    </div>

    <!-- 3. Your Menu Container -->
    <div id="menu-container"></div>
</div>
     
<style>
    .logo-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px 0;
        perspective: 1000px; /* Essential for 3D depth */
    }

    .pro-logo {
        width: 160px; /* Increased size for impact */
        height: 160px;
        object-fit: cover;
        border-radius: 50%; /* Perfect circle for a pro look */
        border: 4px solid #ffffff;
        
        /* The "Depth" Effect: Layered Shadows */
        box-shadow: 
            0 10px 20px rgba(44, 26, 18, 0.15), /* Deep soft shadow */
            0 6px 6px rgba(44, 26, 18, 0.1),   /* Middle shadow */
            0 0 0 8px rgba(255, 255, 255, 0.5); /* Outer glowing ring */
            
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Subtle hover effect for extra "pro" feel */
    .pro-logo:hover {
        transform: translateY(-10px) rotateY(5deg);
        box-shadow: 
            0 20px 40px rgba(44, 26, 18, 0.25),
            0 12px 12px rgba(44, 26, 18, 0.15);
    }
</style>
        <h1>Crave Cave</h1>
        <p style="text-align: center; color: #555;">Official Digital Menu for UMSKAL</p>

        <div id="menu-container"></div>

        <div class="cart-section">
            <h3 style="margin-top:0;">Your Order</h3>
            <div id="cart-items">Empty Cart</div>
            <hr style="border: 0.5px solid #d0e3ff;">
            <h3 style="display: flex; justify-content: space-between;">Total: <span>RM <span id="total">0.00</span></span></h3>
            <button onclick="submitOrder()" style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer;">Place Order & Pay</button>
        </div>
    </div>

    <script>
        const menu = [
    // COTO MAKASSAR / SOTO section
    { id: 1, name: "Soto Ayam", price: 9.00, options: true },
    { id: 2, name: "Soto Daging", price: 9.00, options: true },
    { id: 3, name: "Soto Urat", price: 10.00, options: true },
    { id: 4, name: "Soto Perut", price: 10.00, options: true },
    { id: 5, name: "Soto Urat + Perut", price: 12.00, options: true },
    { id: 6, name: "Soto Ayam + Daging", price: 10.00, options: true },
    { id: 7, name: "Soto Ayam + Urat", price: 11.00, options: true },
    { id: 8, name: "Soto Ayam + Perut", price: 11.00, options: true },
    { id: 9, name: "Soto Ayam + Urat + Perut", price: 13.00, options: true },
    { id: 10, name: "Soto Daging + Urat", price: 11.00, options: true },
    { id: 11, name: "Soto Daging + Perut", price: 11.00, options: true },
    { id: 12, name: "Soto Daging + Urat + Perut", price: 13.00, options: true },
   


    // MEE GORENG section
    { id: 13, name: "Mee Goreng Ayam", price: 9.00 },
    { id: 14, name: "Mee Goreng Daging", price: 9.00 },
    { id: 15, name: "Mee Goreng Udang", price: 11.00 },

    // MI HOON GORENG section
    { id: 16, name: "Mi Hoon Goreng Ayam", price: 9.00 },
    { id: 17, name: "Mi Hoon Goreng Daging", price: 9.00 },
    { id: 18, name: "Mi Hoon Goreng Udang", price: 11.00 },

    // NASI GORENG section
    { id: 19, name: "Nasi Goreng Ayam", price: 9.00 },
    { id: 20, name: "Nasi Goreng Daging", price: 9.00 },
    { id: 21, name: "Nasi Goreng Udang", price: 11.00 },
    { id: 22, name: "Nasi Goreng Pattaya", price: 10.50 },
    { id: 23, name: "Nasi Goreng Kampung", price: 8.00 },

    // MEE KARI section
    { id: 24, name: "Mee Kari Ayam", price: 9.00 },
    { id: 25, name: "Mee Kari Daging", price: 9.00 },
    { id: 26, name: "Mee Kari Udang", price: 11.00 },

    // GADO GADO section
    { id: 27, name: "Gado Gado Ayam", price: 9.00 },
    { id: 28, name: "Gado Gado Daging", price: 9.00 },
    { id: 29, name: "Gado Gado Urat", price: 11.00 },

    // SPECIALS section
    { id: 30, name: "Nasi Ayam Penyet", price: 11.00 },

    // ADD ONS section
    { id: 31, name: "Add On: Telur Mata", price: 1.50 },
    { id: 32, name: "Add On: Extra Nasi", price: 1.00 },
    { id: 33, name: "Add On: Extra Mee", price: 1.00 },
    { id: 34, name: "Add On: Extra Mi Hoon", price: 1.00 }
];
    

        let cart = [];

      function renderMenu() {
    const menuDiv = document.getElementById('menu-container');
    if (!menuDiv) return;
    
    menuDiv.innerHTML = menu.map(item => {
        // 1. Check if this is a Soto item that needs buttons
        if (item.options) {
            return `
                <div class="menu-item" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                    <span><strong>${item.name}</strong><br><small style="color:#888;">RM ${item.price.toFixed(2)}</small></span>
                    <div style="display: flex; gap: 8px; width: 100%;">
                        <button onclick="addToCartWithOptions(${item.id}, 'Nasi Himpit')" style="flex: 1; background: #6c757d; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer;">+ Nasi Himpit</button>
                        <button onclick="addToCartWithOptions(${item.id}, 'Mi Hoon')" style="flex: 1; background: #6c757d; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer;">+ Mi Hoon</button>
                    </div>
                </div>
            `;
        }

        // 2. Standard items (like Nasi Goreng) get the normal 'Add' button
        return `
            <div class="menu-item">
                <span><strong>${item.name}</strong><br><small style="color:#888;">RM ${item.price.toFixed(2)}</small></span>
                <button class="btn-add" onclick="addToCart(${item.id})">Add</button>
            </div>
        `;
    }).join('');
}

// This function handles the standard items (Nasi Goreng, etc.)
function addToCart(id) {
    const item = menu.find(i => i.id === id);
    if (item) {
        cart.push({
            ...item, 
            cartId: Date.now() + Math.random()
        });
        updateCart();
    }
}

// This function handles the Soto items with specific choices
function addToCartWithOptions(id, choice) {
    const item = menu.find(i => i.id === id);
    if (item) {
        cart.push({
            ...item,
            name: `${item.name} (${choice})`,
            cartId: Date.now() + Math.random()
        });
        updateCart();
    }
}

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            const cartDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total');
            if (cart.length === 0) {
                cartDiv.innerHTML = "Empty Cart";
                totalSpan.innerText = "0.00";
                return;
            }

            cartDiv.innerHTML = cart.map((item, index) => `
                <div class="cart-row">
                    <span>${item.name}</span>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-qty" style="background:#dc3545;" onclick="removeFromCart(${index})">-</button>
                        <button class="btn-qty" style="background:#28a745;" onclick="addToCart(${item.id})">+</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalSpan.innerText = total.toFixed(2);
        }

        async function submitOrder() {
    if (cart.length === 0) return alert("Please select items!");
    
    const name = prompt("Enter your Name:");
    const loc = prompt("Delivery (Hostel/Block):");
    if (!name || !loc) return alert("Required!");

    const myUrl = 'https://congenial-space-umbrella-7795769xq9vrcvp4-3000.app.github.dev';
    const totalAmount = document.getElementById('total').innerText;

    // 1. Create the WhatsApp Message
    const orderList = cart.map(i => `- ${i.name}`).join('%0A'); // %0A is a "New Line"
    const whatsappMessage = `*NEW ORDER FROM CRAVE CAVE*%0A%0A` +
                            `*Customer:* ${name}%0A` +
                            `*Location:* ${loc}%0A` +
                            `*Items:*%0A${orderList}%0A%0A` +
                            `*Total:* RM ${totalAmount}%0A%0A` +
                            `Please confirm my order!`;

    const whatsappNumber ="601131465007"; // Change this to your number
    const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${whatsappMessage}`;

    try {
        // 2. Save to your database first (for your records)
        const res = await fetch(`${myUrl}/order`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                customer: name, 
                location: loc, 
                items: cart, 
                total: totalAmount 
            })
        });

        if (res.ok) {
            // 3. Open WhatsApp and show payment screen
            window.open(whatsappUrl, '_blank'); // Opens WhatsApp in a new tab
            showPaymentScreen(name, totalAmount);
        }
    } catch (err) { 
        alert("Server Down! But you can still order via WhatsApp.");
        window.open(whatsappUrl, '_blank'); // Backup if server is dead
    }
}

        function showPaymentScreen(name, total) {
            document.getElementById('main-content').innerHTML = `
                <div class="qr-screen">
                    <h2 style="color:#28a745;">Order Received!</h2>
                    <p>Total: <strong>RM ${total}</strong></p>
                    <img src="qr-code.png" class="qr-img">
                    <p>Scan to pay <strong>Afiq</strong> via TNG.</p>
                    <button onclick="location.reload()" style="width:100%; padding:12px; background:#28a745; color:white; border:none; border-radius:8px; cursor:pointer;">Done (Return to Menu)</button>
                    <button onclick="location.reload()" style="width:100%; margin-top:10px; padding:10px; background:#6c757d; color:white; border:none; border-radius:8px; cursor:pointer; font-size:0.8em;">Cancel Order</button>
                </div>
            `;
        }

        renderMenu();
    </script>
</body>
</html>
