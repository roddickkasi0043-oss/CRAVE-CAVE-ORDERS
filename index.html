<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crave Cave - UMSKAL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #007bff; text-align: center; margin-bottom: 5px; }
        .menu-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .cart-section { margin-top: 30px; padding: 20px; background: #e7f3ff; border-radius: 10px; border: 1px solid #b3e5fc; }
        button { background-color: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .qr-screen { text-align: center; padding: 20px; }
        .qr-img { width: 250px; border: 4px solid #007bff; border-radius: 10px; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <h1>Crave Cave Menu</h1>
        <p style="text-align: center; color: #666;">Authentic Flavors delivered to UMSKAL!</p>

        <div id="menu-container"></div>

        <div class="cart-section">
            <h2>Your Order</h2>
            <div id="cart-items">Empty Cart</div>
            <hr>
            <h3>Total: RM <span id="total">0.00</span></h3>
            <button onclick="submitOrder()" style="width: 100%; padding: 15px; font-size: 1.1em;">Place Order & Pay Now</button>
        </div>
    </div>

    <script>
        const menu = [
            { id: 1, name: "Soto Ayam", price: 9.00 }, { id: 2, name: "Soto Daging", price: 9.00 },
            { id: 3, name: "Soto Urat", price: 10.00 }, { id: 4, name: "Soto Perut", price: 10.00 },
            { id: 5, name: "Soto Urat + Perut", price: 12.00 }, { id: 6, name: "Soto Ayam + Daging", price: 10.00 },
            { id: 7, name: "Soto Ayam + Urat", price: 11.00 }, { id: 8, name: "Soto Ayam + Perut", price: 11.00 },
            { id: 13, name: "Mee Goreng Ayam", price: 9.00 }, { id: 14, name: "Mee Goreng Daging", price: 9.00 },
            { id: 19, name: "Nasi Goreng Ayam", price: 9.00 }, { id: 22, name: "Nasi Goreng Pattaya", price: 10.50 },
            { id: 23, name: "Nasi Goreng Kampung", price: 8.00 }, { id: 30, name: "Nasi Ayam Penyet", price: 11.00 },
            { id: 31, name: "Add On: Telur Mata", price: 1.50 }
        ];

        let cart = [];

        function renderMenu() {
            const menuDiv = document.getElementById('menu-container');
            if(!menuDiv) return;
            menuDiv.innerHTML = menu.map(item => `
                <div class="menu-item">
                    <span><strong>${item.name}</strong><br><small>RM ${item.price.toFixed(2)}</small></span>
                    <button onclick="addToCart(${item.id})">Add</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = menu.find(i => i.id === id);
            cart.push(item);
            updateCart();
        }

        function updateCart() {
            const cartDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('total');
            if (cart.length === 0) {
                cartDiv.innerHTML = "Empty Cart";
                totalSpan.innerText = "0.00";
                return;
            }
            cartDiv.innerHTML = cart.map(i => `<div>• ${i.name}</div>`).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalSpan.innerText = total.toFixed(2);
        }

        async function submitOrder() {
            if (cart.length === 0) return alert("Add food first!");
            const name = prompt("Your Name:");
            const loc = prompt("Delivery Location:");
            if (!name || !loc) return alert("Needed!");

            // YOUR CODESPACE LINK
            const myUrl = 'https://congenial-space-umbrella-7795769xq9vrcvp4-3000.app.github.dev';

            try {
                const res = await fetch(`${myUrl}/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer: name, location: loc, items: cart, total: document.getElementById('total').innerText })
                });
                if (res.ok) showPaymentScreen(name, document.getElementById('total').innerText);
            } catch (err) { alert("Server Down! Check Codespace."); }
        }

        function showPaymentScreen(name, total) {
            document.getElementById('main-content').innerHTML = `
                <div class="qr-screen">
                    <h2>Order Confirmed!</h2>
                    <p>Total: <strong>RM ${total}</strong></p>
                    <img src="qr-code.png" class="qr-img">
                    <p>Scan to pay Afiq via TNG. Then click below:</p>
                    <button onclick="location.reload()" style="background:green;">Done (Back to Menu)</button>
                </div>
            `;
        }

        renderMenu();
    </script>
</body>
</html>
